name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Generate TL types
        run: npm run generate

      - name: Type check
        run: |
          npx tsc -p packages/binary --noEmit
          npx tsc -p packages/crypto --noEmit
          npx tsc -p packages/tl-schema --noEmit
          npx tsc -p packages/transport --noEmit
          npx tsc -p packages/mtproto --noEmit
          npx tsc -p packages/client --noEmit
          npx tsc -p packages/kerain --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
