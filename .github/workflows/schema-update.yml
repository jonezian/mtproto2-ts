name: Schema Update Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Backup current schema
        run: cp packages/tl-schema/src/schema/api.tl packages/tl-schema/src/schema/api.tl.bak

      - name: Fetch latest schema
        run: npx tsx scripts/fetch-schema.ts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet packages/tl-schema/src/schema/api.tl; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            LAYER=$(grep -oP '// LAYER \K\d+' packages/tl-schema/src/schema/api.tl || echo "unknown")
            echo "layer=$LAYER" >> $GITHUB_OUTPUT
            # Generate diff summary for the PR body
            DIFF_SUMMARY=$(npx tsx scripts/diff-schema.ts packages/tl-schema/src/schema/api.tl.bak packages/tl-schema/src/schema/api.tl 2>&1 || true)
            # Write multiline output using delimiter
            echo "summary<<DIFF_EOF" >> $GITHUB_OUTPUT
            echo "$DIFF_SUMMARY" >> $GITHUB_OUTPUT
            echo "DIFF_EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate types
        if: steps.diff.outputs.changed == 'true'
        run: npx tsx scripts/generate.ts

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: npx vitest run

      - name: Clean up backup
        if: always()
        run: rm -f packages/tl-schema/src/schema/api.tl.bak

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore(tl-schema): update to layer ${{ steps.diff.outputs.layer }}'
          body: |
            Auto-detected Telegram TL schema update.

            **Layer**: ${{ steps.diff.outputs.layer }}

            ```
            ${{ steps.diff.outputs.summary }}
            ```

            This PR was created automatically by the schema update workflow.
            Review the generated type changes before merging.
          branch: schema-update-${{ steps.diff.outputs.layer }}
          labels: schema-update,auto-generated
          commit-message: 'chore(tl-schema): update to layer ${{ steps.diff.outputs.layer }}'
